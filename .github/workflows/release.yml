name: Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.new_version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Verify build
        run: cargo build --verbose --release

      - name: Run tests
        run: cargo test --verbose

      - name: Get current version
        id: current_version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -n 1 | sed 's/.*"\([^"]*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Calculate new version
        id: new_version
        run: |
          CURRENT=${{ steps.current_version.outputs.version }}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ github.event.inputs.version_type }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update Cargo.toml and Cargo.lock
        run: |
          sed -i 's/^version[[:space:]]*=.*/version      = "${{ steps.new_version.outputs.version }}"/' Cargo.toml
          # Refresh the workspace member versions in Cargo.lock so it stays in
          # sync with the bumped Cargo.toml (member crates use version.workspace).
          cargo update --workspace

      - name: Verify update
        run: |
          grep '^version' Cargo.toml | head -n 1

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version to ${{ steps.new_version.outputs.version }}"
          git push origin main

      - name: Create tag
        run: |
          git tag -a "v${{ steps.new_version.outputs.version }}" -m "Release ${{ steps.new_version.outputs.version }}"
          git push origin "v${{ steps.new_version.outputs.version }}"

      - name: Generate changelog from conventional commits
        id: changelog
        run: |
          # Find the previous tag (skip the one we just created)
          CURRENT_TAG="v${{ steps.new_version.outputs.version }}"
          PREVIOUS_TAG=$(git tag --sort=-v:refname | grep '^v' | grep -v "^${CURRENT_TAG}$" | head -n 1)

          if [ -z "$PREVIOUS_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREVIOUS_TAG}..HEAD"
          fi

          FEATURES=$(git log "$RANGE" --pretty=format:"- %s (%h)" --grep="^feat" --no-merges)
          FIXES=$(git log "$RANGE" --pretty=format:"- %s (%h)" --grep="^fix" --no-merges)
          PERF=$(git log "$RANGE" --pretty=format:"- %s (%h)" --grep="^perf" --no-merges)
          DOCS=$(git log "$RANGE" --pretty=format:"- %s (%h)" --grep="^docs" --no-merges)
          REFACTOR=$(git log "$RANGE" --pretty=format:"- %s (%h)" --grep="^refactor" --no-merges)
          CHORE=$(git log "$RANGE" --pretty=format:"- %s (%h)" --grep="^chore" --no-merges)
          CI=$(git log "$RANGE" --pretty=format:"- %s (%h)" --grep="^ci" --no-merges)

          CHANGELOG=""

          if [ -n "$FEATURES" ]; then
            CHANGELOG="${CHANGELOG}### 🚀 Features\n\n${FEATURES}\n\n"
          fi
          if [ -n "$FIXES" ]; then
            CHANGELOG="${CHANGELOG}### 🐛 Bug Fixes\n\n${FIXES}\n\n"
          fi
          if [ -n "$PERF" ]; then
            CHANGELOG="${CHANGELOG}### ⚡ Performance\n\n${PERF}\n\n"
          fi
          if [ -n "$DOCS" ]; then
            CHANGELOG="${CHANGELOG}### 📚 Documentation\n\n${DOCS}\n\n"
          fi
          if [ -n "$REFACTOR" ]; then
            CHANGELOG="${CHANGELOG}### ♻️ Refactoring\n\n${REFACTOR}\n\n"
          fi
          if [ -n "$CHORE" ]; then
            CHANGELOG="${CHANGELOG}### 🔧 Chores\n\n${CHORE}\n\n"
          fi
          if [ -n "$CI" ]; then
            CHANGELOG="${CHANGELOG}### 👷 CI\n\n${CI}\n\n"
          fi

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="No conventional commits found in this release.\n"
          fi

          echo -e "$CHANGELOG" > changelog.md

          if [ -n "$PREVIOUS_TAG" ]; then
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${CURRENT_TAG}" >> changelog.md
          fi

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.new_version.outputs.version }}
          name: Release ${{ steps.new_version.outputs.version }}
          body_path: changelog.md
          draft: false
          prerelease: false

  build-binaries:
    needs: create-release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: gfs-linux-x86_64
            use_cross: false
            binary_files: "gfs"
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: gfs-macos-x86_64
            use_cross: false
            binary_files: "gfs"
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: gfs-macos-aarch64
            use_cross: false
            binary_files: "gfs"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: gfs-windows-x86_64
            use_cross: false
            binary_files: "gfs.exe"
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    env:
      GFS_POSTHOG_API_KEY: ${{ secrets.GFS_POSTHOG_API_KEY }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.create-release.outputs.version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross (for Linux ARM64)
        if: matrix.use_cross == 'true'
        run: cargo install cross

      - name: Install target
        if: matrix.use_cross != 'true'
        run: rustup target add ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build binaries (native)
        if: matrix.use_cross != 'true'
        run: cargo build --release --target ${{ matrix.target }} -p gfs-cli

      - name: Build binaries (cross)
        if: matrix.use_cross == 'true'
        run: cross build --release --target ${{ matrix.target }} -p gfs-cli

      - name: Package binaries
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ matrix.artifact_name }}.tar.gz ${{ matrix.binary_files }}
          mv ${{ matrix.artifact_name }}.tar.gz ${{ github.workspace }}/

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: ./${{ matrix.artifact_name }}.tar.gz

  build-ai-tools:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.create-release.outputs.version }}

      - name: Create AI tools archive
        run: |
          tar czf gfs-ai-tools-${{ needs.create-release.outputs.version }}.tar.gz skills agents

      - name: Upload AI tools Release Asset
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: ./gfs-ai-tools-${{ needs.create-release.outputs.version }}.tar.gz
