# PR workflow runs only after a repo admin approves the run.
# Configure: Settings → Environments → "pr-validation" → Required reviewers (e.g. admins or a team).
name: PR Build and Test

on:
  pull_request:
    branches:
      - main

# Cancel superseded runs when new commits land on the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    environment: pr-validation
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --verbose

      - name: Run clippy
        if: matrix.os == 'ubuntu-latest'
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check formatting
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt -- --check

      - name: Run tests
        if: matrix.os == 'ubuntu-latest'
        run: cargo test --verbose

      - name: Run tests (macOS/Windows)
        if: matrix.os != 'ubuntu-latest'
        run: cargo test --verbose -- --skip clickhouse --skip postgres
