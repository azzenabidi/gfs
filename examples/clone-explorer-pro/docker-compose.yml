# Source PostgreSQL the clone reads from. Plain upstream: no GFS objects.
services:
  source:
    image: postgres:16
    container_name: gfs-explorer-pro-source
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: appdb
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - max_wal_size=2GB
    ports:
      - "${SOURCE_PORT:-55452}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d appdb"]
      interval: 2s
      timeout: 3s
      retries: 30

# The optional auto-warming proxy is no longer a compose service: `scripts/run.sh
# --proxy` now builds and runs the `guepard-proxy-v2` binary directly on the host
# (it reaches the host-published clone at 127.0.0.1:CLONE_PORT). See the script.
